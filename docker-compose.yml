services:
  postgres:
    image: postgres:16
    container_name: kanban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kanban_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - kanban-postgres-data:/var/lib/postgresql/data

volumes:
  kanban-postgres-data:
